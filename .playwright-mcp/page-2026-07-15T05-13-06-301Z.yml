            - strong [ref=e342]: 45%
            - text: 。同時，太極拳的「沉肩墜肘」要求能改善圓肩駝背問題，從根本上減少肩頸壓力。許多辦公室學員在練習1-2個月後反映痛症明顯減輕，睡眠質素亦有改善。
