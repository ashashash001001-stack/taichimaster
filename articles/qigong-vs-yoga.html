        <div class="prose prose-lg max-w-none bg-white rounded-2xl p-8 md:p-12 shadow-sm"><p class="text-gray-700 leading-relaxed mb-4">氣功和瑜伽都是歷史悠久的東方養生方法，但它們有不同的哲學基礎和練習方式。</p><p class="text-gray-700 leading-relaxed mb-4">哲學基礎：氣功源自中國道家思想，強調「氣」的運行和陰陽平衡。瑜伽源自印度哲學，強調身心靈的統一。</p><p class="text-gray-700 leading-relaxed mb-4">練習方式：氣功的動作通常更為簡單舒緩。瑜伽的動作（體式）更為多樣，有些體式具有挑戰性。</p><p class="text-gray-700 leading-relaxed mb-4">適合人群：氣功更適合長者和初學者。瑜伽適合追求身體挑戰的人士。</p></div>
