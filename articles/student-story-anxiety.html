            <p class="text-gray-600 text-lg leading-relaxed">28歲的劉小姐患有焦慮症，太極拳成為她康復之路的重要一環。</p>

        <div class="prose prose-lg max-w-none bg-white rounded-2xl p-8 md:p-12 shadow-sm"><p class="text-gray-700 leading-relaxed mb-4">劉小姐，28歲，市場營銷專員。患有焦慮症兩年，正在接受心理治療。</p><p class="text-gray-700 leading-relaxed mb-4">「我嘅心理醫生建議我做運動，話對焦慮有好處。但係我去咗幾次健身房，覺得啲環境令我更加緊張。」</p><p class="text-gray-700 leading-relaxed mb-4">「後來我喺網上見到林師傅嘅太極班，決定試下。第一次去嘅時候好緊張，但係課堂氣氛好放鬆。」</p><p class="text-gray-700 leading-relaxed mb-4">「練咗幾個月之後，我發現自己嘅焦慮症狀好咗好多。」</p></div>
